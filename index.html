<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dhruv Life RPG System v4</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#020617;color:#e5e7eb;margin:0;padding:20px}
.container{max-width:1000px;margin:auto}
h1{text-align:center;color:#38bdf8}
.card{background:#0f172a;border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 10px 25px rgba(0,0,0,0.6)}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.stat{background:#1e293b;padding:10px;border-radius:10px;text-align:center}
.quest{display:flex;justify-content:space-between;align-items:center;background:#1e293b;padding:10px;border-radius:10px;margin-bottom:10px}
button{padding:8px 12px;border:none;border-radius:8px;margin-left:5px;font-weight:bold;cursor:pointer}
.complete{background:#22c55e;color:#022c22}
.skip{background:#ef4444;color:white}
.delete{background:#f59e0b;color:black}
.addbtn{background:#38bdf8;color:black;margin-top:10px}
.progress{height:20px;background:#1e293b;border-radius:10px;overflow:hidden;margin-top:10px}
.progress-bar{height:100%;background:#38bdf8;width:0%}
.rank{font-size:18px;font-weight:bold;margin-top:5px}
.avatar{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid #38bdf8}
.levelup{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);background:#38bdf8;color:black;padding:20px 40px;border-radius:12px;font-size:28px;font-weight:bold;display:none;z-index:10}
.badge{display:inline-block;background:#1e293b;padding:8px 12px;border-radius:10px;margin:5px}
.skill{background:#1e293b;padding:10px;border-radius:10px;margin:5px;display:inline-block}
</style>
</head>
<body>
<div class="container">
<h1>⚔️ Dhruv Solo System</h1>

<div class="card">
<h2>Character</h2>
<div style="display:flex;gap:15px;align-items:center">
<img id="avatar" class="avatar" src="https://i.imgur.com/2DhmtJ4.png">
<input type="file" id="avatarUpload">
</div>
<div style="margin-top:10px">Level: <span id="level">1</span></div>
<div>XP: <span id="xp">0</span> / <span id="next">100</span></div>
<div class="rank">Rank: <span id="rank">E Rank</span></div>
<div class="progress"><div class="progress-bar" id="bar"></div></div>
<div>🔥 Streak: <span id="streak">0</span></div>
</div>

<div class="card">
<h2>Stats</h2>
<div class="stats">
<div class="stat">💪 Strength<br><span id="str">1</span></div>
<div class="stat">🧠 Intelligence<br><span id="int">1</span></div>
<div class="stat">⚡ Discipline<br><span id="disc">1</span></div>
<div class="stat">💰 Wealth<br><span id="wealth">1</span></div>
<div class="stat">🗣 Influence<br><span id="inf">1</span></div>
</div>
</div>

<div class="card">
<h2>Daily Quests</h2>
<div id="quests"></div>
<input id="taskName" placeholder="Task">
<input id="taskXP" type="number" placeholder="XP" style="width:70px">
<select id="taskStat">
<option value="disc">Discipline</option>
<option value="str">Strength</option>
<option value="int">Intelligence</option>
<option value="wealth">Wealth</option>
<option value="inf">Influence</option>
</select>
<button class="addbtn" onclick="addTask()">Add Task</button>
</div>

<div class="card">
<h2>Weekly Boss Missions</h2>
<div id="boss"></div>
</div>

<div class="card">
<h2>Achievements</h2>
<div id="badges"></div>
</div>

<div class="card">
<h2>Skill Tree</h2>
<div>
<span class="skill">Networking</span>
<span class="skill">Firewall</span>
<span class="skill">Security</span>
<span class="skill">Cloud</span>
<span class="skill">GRC</span>
</div>
</div>

<div class="card">
<h2>XP Progress</h2>
<canvas id="xpChart"></canvas>
</div>

</div>

<div class="levelup" id="levelup">LEVEL UP</div>

<script>
let defaultQuests=[
{name:'Wake early',xp:10,stat:'disc'},
{name:'Study Networking',xp:25,stat:'int'},
{name:'Workout',xp:25,stat:'str'}
]

let bossQuests=[
'Apply to 10 jobs',
'Study 5 hours networking',
'Complete 5 workouts'
]

let data=JSON.parse(localStorage.getItem('lifeRPG'))||{
xp:0,level:1,next:100,streak:0,
stats:{str:1,int:1,disc:1,wealth:1,inf:1},
quests:defaultQuests,
log:[],
badges:[]
}

function save(){localStorage.setItem('lifeRPG',JSON.stringify(data))}

function getRank(){
if(data.level>=70)return'S Rank'
if(data.level>=40)return'A Rank'
if(data.level>=20)return'B Rank'
if(data.level>=10)return'C Rank'
if(data.level>=5)return'D Rank'
return'E Rank'
}

function levelUpEffect(){
let el=document.getElementById('levelup')
el.style.display='block'
setTimeout(()=>el.style.display='none',1500)
}

function gainXP(amount,stat){
data.xp+=amount
 data.stats[stat]++
 data.streak++
 data.log.push(data.xp)

if(data.xp>=data.next){
data.xp-=data.next
 data.level++
 levelUpEffect()
 checkAchievements()
}

save();update();renderChart()
}

function skipQuest(){
data.xp=Math.max(0,data.xp-5)
data.streak=0
save();update()
}

function deleteTask(i){data.quests.splice(i,1);save();renderQuests()}

function addTask(){
let name=document.getElementById('taskName').value
let xp=parseInt(document.getElementById('taskXP').value)
let stat=document.getElementById('taskStat').value
if(!name||!xp)return
 data.quests.push({name,xp,stat})
save();renderQuests()
}

function renderQuests(){
let c=document.getElementById('quests');c.innerHTML=''
 data.quests.forEach((q,i)=>{
 let div=document.createElement('div')
 div.className='quest'
 div.innerHTML=`<div>${q.name} (+${q.xp})</div>
 <div>
 <button class='complete'>✔</button>
 <button class='skip'>✖</button>
 <button class='delete'>🗑</button>
 </div>`
 div.querySelector('.complete').onclick=()=>gainXP(q.xp,q.stat)
 div.querySelector('.skip').onclick=()=>skipQuest()
 div.querySelector('.delete').onclick=()=>deleteTask(i)
 c.appendChild(div)
 })
}

function renderBoss(){
let b=document.getElementById('boss')
bossQuests.forEach(q=>{
let div=document.createElement('div')
div.className='quest'
div.innerHTML=`<div>${q}</div><button class='complete'>Complete</button>`
div.querySelector('button').onclick=()=>gainXP(100,'disc')
b.appendChild(div)
})
}

function checkAchievements(){
if(data.level>=5&&!data.badges.includes('Rising Player'))data.badges.push('Rising Player')
if(data.level>=10&&!data.badges.includes('Disciplined'))data.badges.push('Disciplined')
renderBadges()
}

function renderBadges(){
let b=document.getElementById('badges')
b.innerHTML=''
 data.badges.forEach(x=>{
 let el=document.createElement('div')
 el.className='badge'
 el.innerText=x
 b.appendChild(el)
 })
}

function update(){
level.innerText=data.level
xp.innerText=data.xp
rank.innerText=getRank()
streak.innerText=data.streak
bar.style.width=(data.xp/data.next*100)+'%'
str.innerText=data.stats.str
int.innerText=data.stats.int
disc.innerText=data.stats.disc
wealth.innerText=data.stats.wealth
inf.innerText=data.stats.inf
}

function renderChart(){
let ctx=document.getElementById('xpChart')
new Chart(ctx,{type:'line',data:{labels:data.log.map((_,i)=>i+1),datasets:[{label:'XP Growth',data:data.log}]}})
}

// avatar
avatarUpload.onchange=function(){
let file=this.files[0]
let reader=new FileReader()
reader.onload=e=>{avatar.src=e.target.result;localStorage.setItem('avatar',e.target.result)}
reader.readAsDataURL(file)
}

let savedAvatar=localStorage.getItem('avatar')
if(savedAvatar)avatar.src=savedAvatar

renderQuests()
renderBoss()
renderBadges()
update()
renderChart()
</script>

</body>
</html>
